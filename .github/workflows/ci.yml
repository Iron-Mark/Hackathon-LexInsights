name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: LexInSight app gates
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_PUBLIC_RAG_API_URL: https://devkada.resqlink.org
      NEXT_PUBLIC_RAG_WS_URL: wss://devkada.resqlink.org
      NEXT_PUBLIC_USE_RAG_PROXY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Markdown link checker self-test
        run: npm run check:docs:self-test

      - name: Markdown link check
        run: npm run check:docs

      - name: Readiness self-test
        run: npm run check:readiness:self-test

      - name: Deployment preflight self-test
        run: npm run check:deployment:self-test

      - name: Live deployment self-test
        run: npm run check:live:self-test

      - name: RAG proxy self-test
        run: npm run check:rag-proxy:self-test

      - name: Providerless research self-test
        run: npm run check:providerless:self-test

      - name: Release integrity self-test
        run: npm run check:release:self-test

      - name: Release integrity check
        run: npm run check:release

      - name: Build
        run: npm run build

      - name: Browser smoke
        run: npm run smoke:browser
