<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" aria-labelledby="title desc" role="img" viewBox="0 0 1600 900"><title id="title">LexInsights providerless RAG flow</title><desc id="desc">Diagram showing how a user query moves through local corpus retrieval, ranking, citation support, and compliance answer generation.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fbfaff"/><stop offset=".52" stop-color="#f1eeff"/><stop offset="1" stop-color="#171322"/></linearGradient><linearGradient id="iris" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#8a82dc"/><stop offset="1" stop-color="#3f33bd"/></linearGradient><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="18" flood-color="#171322" flood-opacity=".14" stdDeviation="22"/></filter><style>.title{font:800 54px Arial,sans-serif;fill:#171322}.subtitle{font:600 24px Arial,sans-serif;fill:#475569}.node-title{font:800 28px Arial,sans-serif;fill:#171322}.node-copy{font:500 19px Arial,sans-serif;fill:#475569}.badge{font:800 15px Arial,sans-serif;fill:#3f33bd;letter-spacing:.04em}.dark-title{fill:#f8fafc}.dark-copy{fill:#cbd5e1}.arrow{stroke:#8a82dc;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;fill:none}</style></defs><rect width="1600" height="900" fill="url(#bg)"/><circle cx="1310" cy="120" r="260" fill="#8a82dc" opacity=".12"/><circle cx="1445" cy="770" r="360" fill="#3f33bd" opacity=".18"/><circle cx="170" cy="760" r="260" fill="#8a82dc" opacity=".1"/><text x="104" y="112" class="badge">LEXINSIGHTS ARCHITECTURE</text><text x="104" y="178" class="title">Providerless Local RAG Flow</text><text x="106" y="222" class="subtitle">Source-first Philippine legal research without requiring an external AI provider.</text><g filter="url(#shadow)"><rect width="260" height="160" x="104" y="318" fill="#fbfaff" stroke="#8a82dc" stroke-opacity=".48" rx="24"/><rect width="56" height="56" x="132" y="348" fill="#efecff" rx="16"/><path stroke="#3f33bd" stroke-linecap="round" stroke-width="5" d="M151 374h18m-18 12h38m-38-24h26"/><text x="132" y="432" class="node-title">User Query</text><text x="132" y="464" class="node-copy">Question, draft, or document</text></g><path d="M382 398h102" class="arrow"/><path d="M468 380l20 18-20 18" class="arrow"/><g filter="url(#shadow)"><rect width="300" height="204" x="506" y="296" fill="#fbfaff" stroke="#8a82dc" stroke-opacity=".48" rx="24"/><rect width="58" height="58" x="536" y="328" fill="#dcfce7" rx="16"/><path stroke="#047857" stroke-linecap="round" stroke-width="5" d="M553 360h24m-24 14h30m-18-28v42"/><text x="536" y="418" class="node-title">Local Corpus</text><text x="536" y="452" class="node-copy">Laws, issuances, advisories,</text><text x="536" y="480" class="node-copy">frameworks, and source registry</text></g><path d="M824 398h102" class="arrow"/><path d="M910 380l20 18-20 18" class="arrow"/><g filter="url(#shadow)"><rect width="300" height="204" x="948" y="296" fill="#fbfaff" stroke="#8a82dc" stroke-opacity=".48" rx="24"/><rect width="58" height="58" x="978" y="328" fill="#e0f2fe" rx="16"/><path stroke="#0284c7" stroke-linecap="round" stroke-linejoin="round" stroke-width="5" d="M994 368l18-24 18 24m-36 14h36"/><text x="978" y="418" class="node-title">Ranking</text><text x="978" y="452" class="node-copy">Match evidence, confidence,</text><text x="978" y="480" class="node-copy">source tier, and query intent</text></g><path d="M1266 398h102" class="arrow"/><path d="M1352 380l20 18-20 18" class="arrow"/><g filter="url(#shadow)"><rect width="210" height="160" x="1390" y="318" fill="#241f32" stroke="#a8a1ee" stroke-opacity=".42" rx="24"/><rect width="56" height="56" x="1420" y="348" fill="#8a82dc" fill-opacity=".22" rx="16"/><path stroke="#86efac" stroke-linecap="round" stroke-linejoin="round" stroke-width="6" d="M1436 374l10 10 18-24"/><text x="1420" y="432" class="node-title dark-title">Answer</text><text x="1420" y="464" class="node-copy dark-copy">Checklist + citations</text></g><g filter="url(#shadow)"><rect width="760" height="148" x="420" y="626" fill="#241f32" stroke="#a8a1ee" stroke-opacity=".28" rx="26"/><text x="458" y="686" class="node-title dark-title">Verification Loop</text><text x="458" y="724" class="node-copy dark-copy">Every generated answer keeps official source links close, highlights confidence,</text><text x="458" y="752" class="node-copy dark-copy">and reminds users to verify legal output with primary authorities or counsel.</text><rect width="128" height="42" x="1008" y="656" fill="#dcfce7" rx="21"/><text x="1036" y="683" fill="#047857" class="badge">SOURCE FIRST</text></g><path d="M1495 500c0 178-178 224-514 224" class="arrow" opacity=".7"/><path d="M1000 704l-24 20 24 20" class="arrow" opacity=".7"/></svg>