<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LexInsights providerless RAG flow</title>
  <desc id="desc">Diagram showing how a user query moves through local corpus retrieval, ranking, citation support, and compliance answer generation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaff"/>
      <stop offset="0.52" stop-color="#f1eeff"/>
      <stop offset="1" stop-color="#171322"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8a82dc"/>
      <stop offset="1" stop-color="#3f33bd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#171322" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 800 54px Arial, sans-serif; fill: #171322; }
      .subtitle { font: 600 24px Arial, sans-serif; fill: #475569; }
      .node-title { font: 800 28px Arial, sans-serif; fill: #171322; }
      .node-copy { font: 500 19px Arial, sans-serif; fill: #475569; }
      .badge { font: 800 15px Arial, sans-serif; fill: #3f33bd; letter-spacing: .04em; }
      .dark-title { fill: #f8fafc; }
      .dark-copy { fill: #cbd5e1; }
      .arrow { stroke: #8a82dc; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1310" cy="120" r="260" fill="#8a82dc" opacity="0.12"/>
  <circle cx="1445" cy="770" r="360" fill="#3f33bd" opacity="0.18"/>
  <circle cx="170" cy="760" r="260" fill="#8a82dc" opacity="0.10"/>

  <text x="104" y="112" class="badge">LEXINSIGHTS ARCHITECTURE</text>
  <text x="104" y="178" class="title">Providerless Local RAG Flow</text>
  <text x="106" y="222" class="subtitle">Source-first Philippine legal research without requiring an external AI provider.</text>

  <g filter="url(#shadow)">
    <rect x="104" y="318" width="260" height="160" rx="24" fill="#fbfaff" stroke="#8a82dc" stroke-opacity="0.48"/>
    <rect x="132" y="348" width="56" height="56" rx="16" fill="#efecff"/>
    <path d="M151 374h18m-18 12h38m-38-24h26" stroke="#3f33bd" stroke-width="5" stroke-linecap="round"/>
    <text x="132" y="432" class="node-title">User Query</text>
    <text x="132" y="464" class="node-copy">Question, draft, or document</text>
  </g>

  <path class="arrow" d="M382 398h102"/>
  <path class="arrow" d="M468 380l20 18-20 18"/>

  <g filter="url(#shadow)">
    <rect x="506" y="296" width="300" height="204" rx="24" fill="#fbfaff" stroke="#8a82dc" stroke-opacity="0.48"/>
    <rect x="536" y="328" width="58" height="58" rx="16" fill="#dcfce7"/>
    <path d="M553 360h24m-24 14h30m-18-28v42" stroke="#047857" stroke-width="5" stroke-linecap="round"/>
    <text x="536" y="418" class="node-title">Local Corpus</text>
    <text x="536" y="452" class="node-copy">Laws, issuances, advisories,</text>
    <text x="536" y="480" class="node-copy">frameworks, and source registry</text>
  </g>

  <path class="arrow" d="M824 398h102"/>
  <path class="arrow" d="M910 380l20 18-20 18"/>

  <g filter="url(#shadow)">
    <rect x="948" y="296" width="300" height="204" rx="24" fill="#fbfaff" stroke="#8a82dc" stroke-opacity="0.48"/>
    <rect x="978" y="328" width="58" height="58" rx="16" fill="#e0f2fe"/>
    <path d="M994 368l18-24 18 24m-36 14h36" stroke="#0284c7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="978" y="418" class="node-title">Ranking</text>
    <text x="978" y="452" class="node-copy">Match evidence, confidence,</text>
    <text x="978" y="480" class="node-copy">source tier, and query intent</text>
  </g>

  <path class="arrow" d="M1266 398h102"/>
  <path class="arrow" d="M1352 380l20 18-20 18"/>

  <g filter="url(#shadow)">
    <rect x="1390" y="318" width="210" height="160" rx="24" fill="#241f32" stroke="#a8a1ee" stroke-opacity="0.42"/>
    <rect x="1420" y="348" width="56" height="56" rx="16" fill="#8a82dc" fill-opacity="0.22"/>
    <path d="M1436 374l10 10 18-24" stroke="#86efac" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1420" y="432" class="node-title dark-title">Answer</text>
    <text x="1420" y="464" class="node-copy dark-copy">Checklist + citations</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="626" width="760" height="148" rx="26" fill="#241f32" stroke="#a8a1ee" stroke-opacity="0.28"/>
    <text x="458" y="686" class="node-title dark-title">Verification Loop</text>
    <text x="458" y="724" class="node-copy dark-copy">Every generated answer keeps official source links close, highlights confidence,</text>
    <text x="458" y="752" class="node-copy dark-copy">and reminds users to verify legal output with primary authorities or counsel.</text>
    <rect x="1008" y="656" width="128" height="42" rx="21" fill="#dcfce7"/>
    <text x="1036" y="683" class="badge" fill="#047857">SOURCE FIRST</text>
  </g>

  <path class="arrow" d="M1495 500c0 178-178 224-514 224" opacity="0.7"/>
  <path class="arrow" d="M1000 704l-24 20 24 20" opacity="0.7"/>
</svg>
